<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ghoulie Lotto</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="theme-light">
  <main class="app-shell">
    <header>
      <h1>Ghoulie Lotto</h1>
      <p>Choose 6 numbers from 1-99, buy tickets, then draw and win.</p>
    </header>

    <div class="tab-bar">
      <button type="button" class="tab-button active" data-tab="buy">Buy Tickets</button>
      <button type="button" class="tab-button" data-tab="settings">Settings</button>
    </div>

    <section class="panel purchase-panel" id="buyTab">
      <h2>Buy Tickets</h2>
      <div class="buy-summary-row">
        <div>
          <strong>Next ticket #</strong>
          <div id="nextTicketNumber">1</div>
        </div>
        <div>
          <label for="ticketName">Ticket name</label>
          <input id="ticketName" type="text" placeholder="Optional name" />
        </div>
        <div>
          <strong>Total ticket price</strong>
          <div id="currentTotalPrice">$2.00</div>
        </div>
      </div>
      <div class="field-row">
        <label for="buyQuantity">Quantity</label>
        <input id="buyQuantity" type="number" min="1" value="1" />
      </div>
      <div class="purchase-actions">
        <button id="quickPickBtn">Quick Pick</button>
        <button id="customPickBtn">Use Custom Numbers</button>
      </div>
      <p class="help-text">Custom numbers must be 6 unique values between 1 and 99.</p>
      <div class="custom-grid" id="customInputs" style="display:none;">
        <input type="number" min="1" max="99" placeholder="#1" />
        <input type="number" min="1" max="99" placeholder="#2" />
        <input type="number" min="1" max="99" placeholder="#3" />
        <input type="number" min="1" max="99" placeholder="#4" />
        <input type="number" min="1" max="99" placeholder="#5" />
        <input type="number" min="1" max="99" placeholder="#6" />
      </div>
      <button id="addCustomTicketBtn" class="secondary" style="display:none;">Add Custom Ticket</button>
    </section>

    <section class="panel settings-panel hidden" id="settingsTab">
      <h2>Settings</h2>
      <div class="setting-row">
        <label for="ticketPrice">Ticket price ($)</label>
        <input id="ticketPrice" type="number" min="1" value="2" />
      </div>
      <div class="setting-row">
        <label for="maxTickets">Max tickets at once</label>
        <input id="maxTickets" type="number" min="1" value="10" />
      </div>
      <div class="setting-row">
        <label for="themeSelect">Theme</label>
        <select id="themeSelect">
          <option value="light">Light</option>
          <option value="dark">Dark</option>
          <option value="retro">Retro</option>
          <option value="ocean">Ocean</option>
          <option value="solar">Solar</option>
          <option value="forest">Forest</option>
        </select>
      </div>
    </section>

    <section class="panel tickets-panel">
      <h2>Your Tickets</h2>
      <div id="ticketList" class="ticket-list"></div>
      <div class="summary-row">
        <span id="ticketCount">0 tickets</span>
        <span id="totalCost">$0</span>
      </div>
      <button id="drawBtn" class="primary">Draw Numbers</button>
    </section>

    <section class="panel result-panel">
      <h2>Drawing Result</h2>
      <div class="result-block">
        <p><strong>Drawn numbers:</strong> <span id="drawnNumbers">—</span></p>
        <p><strong>Winning tickets:</strong> <span id="winnerCount">0</span></p>
        <div id="resultDetails"></div>
      </div>
    </section>
  </main>
  <script src="script.js"></script>
</body>
</html>
